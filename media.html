<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Media Page</title>
</head>
<body>
	<h1>Trang multimedia sản phẩm</h1>

	<section>
		<h2>Ảnh sản phẩm</h2>

		<figure>
			<img src="https://placehold.co/600x400/png?text=iPhone+16+Front" alt="iPhone 16 màu đen nhìn chính diện" loading="lazy" style="max-width: 100%; height: auto;">
			<figcaption>iPhone 16 màu đen</figcaption>
		</figure>

		<figure>
			<img src="https://placehold.co/600x400/png?text=Accessory+Bundle" alt="Bộ phụ kiện đi kèm cho iPhone 16" loading="lazy" style="max-width: 100%; height: auto;">
			<figcaption>Bộ phụ kiện đi kèm</figcaption>
		</figure>

		<figure>
			<img src="https://placehold.co/600x400/png?text=Store+Showcase" alt="Khu trưng bày sản phẩm tại cửa hàng" loading="lazy" style="max-width: 100%; height: auto;">
			<figcaption>Khu trưng bày sản phẩm</figcaption>
		</figure>
	</section>

	<section>
		<h2>Video YouTube</h2>
		<iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Video giới thiệu sản phẩm" allowfullscreen></iframe>
	</section>

	<section>
		<h2>Video nội bộ</h2>
		<video controls poster="https://placehold.co/800x450/png?text=Video+Poster" width="640">
			<source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
			<source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm" type="video/webm">
			Trình duyệt của bạn không hỗ trợ video.
		</video>
	</section>

	<section>
		<h2>Audio</h2>
		<audio controls>
			<source src="https://interactive-examples.mdn.mozilla.net/media/examples/t-rex-roar.mp3" type="audio/mpeg">
			Trình duyệt của bạn không hỗ trợ audio.
		</audio>
	</section>

	<section>
		<h2>SVG inline</h2>
		<svg width="120" height="120" viewBox="0 0 120 120" role="img" aria-label="Logo hình tròn">
			<circle cx="60" cy="60" r="50" fill="#2563eb"></circle>
			<rect x="45" y="45" width="30" height="30" rx="6" fill="#ffffff"></rect>
		</svg>
	</section>
</body>
</html>
